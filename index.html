<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Be Selected - Corporate</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --primary-navy: #0a192f; --accent-green: #00d28d; --text-white: #ffffff; --text-gray: #b0b0b0; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: var(--primary-navy); color: var(--text-white); }
        
        /* 섹션 공통 */
        section { padding: 80px 10%; }

        /* 히어로 */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        h1 { font-size: clamp(3rem, 8vw, 6rem); font-weight: 800; line-height: 1.1; margin-bottom: 2rem; }
        
        /* 서비스 카드 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { border: 1px solid #1e3a5f; padding: 40px; background: #0f223f; transition: 0.4s; }
        .card:hover { border-color: var(--accent-green); transform: translateY(-10px); }
        
        /* 프로젝트 리스트 */
        .section-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 50px; border-left: 5px solid var(--accent-green); padding-left: 20px; }
        .item { padding: 30px 0; border-bottom: 1px solid #1e3a5f; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <!-- 히어로 섹션 -->
    <section class="hero">
        <h1>BE SELECTED<br>VALUE DRIVEN.</h1>
        <p>산업기계 유통의 새로운 패러다임, 비셀렉티드가 시장의 질서를 재정의합니다.</p>
    </section>

    <!-- 서비스 섹션 -->
    <section>
        <div class="grid">
            <div class="card">
                <h3>Industrial Machinery Export</h3>
                <p>데이터 기반의 검증된 산업용 장비를 글로벌 시장으로 연결합니다.</p>
            </div>
            <div class="card">
                <h3>Franchise Incubation</h3>
                <p>검증된 브랜드의 해외 안착을 위한 현지화 전략을 실행합니다.</p>
            </div>
        </div>
    </section>

    <!-- 프로젝트 섹션 -->
    <section>
        <div class="section-title">OUR PROJECTS</div>
        <div class="item"><strong>[Global] CNC 선반 아시아 매각</strong> <span>2026</span></div>
        <div class="item"><strong>[Brand] F&B 동남아 인큐베이팅</strong> <span>2025</span></div>
    </section>

</body>
</html>
